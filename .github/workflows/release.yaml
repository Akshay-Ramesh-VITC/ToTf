      #     pyproject = Path("pyproject.toml")

      #     content = pyproject.read_text()

      #     match = re.search(
      #         r'version\s*=\s*"(\d+)\.(\d+)\.(\d+)"',
      #         content
      #     )

      #     if not match:
      #         raise Exception("Version not found in pyproject.toml")

      #     major, minor, patch = map(int, match.groups())

      #     patch += 1

      #     # Custom rollover:
      #     # 0.2.9 -> 0.3.0
      #     if patch > 9:
      #         patch = 0
