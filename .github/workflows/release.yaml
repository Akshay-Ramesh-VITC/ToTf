      #     new_version = f"{major}.{minor}.{patch}"

      #     updated = re.sub(
      #         r'version\s*=\s*"\d+\.\d+\.\d+"',
      #         f'version = "{new_version}"',
      #         content
      #     )

      #     pyproject.write_text(updated)

      #     with open("version.txt", "w") as f:
      #         f.write(new_version)

      #     print(f"Updated version: {new_version}")
      #     EOF

      #     echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT
      - name: Bump Version
        id: bump
        run: |
          python << 'EOF'
          import re
          from pathlib import Path

          # 1. Define file paths
          pyproject = Path("pyproject.toml")
          setup_py = Path("setup.py")
          init_py = Path("__init__.py") 

          # 2. Get the new version
          content = pyproject.read_text()
          match = re.search(r'version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', content)
          if not match: raise Exception("Version not found in pyproject.toml")

          major, minor, patch = map(int, match.groups())
          patch += 1
          if patch > 9:
              patch = 0
              minor += 1
          new_version = f"{major}.{minor}.{patch}"

          # 3. Update pyproject.toml
          pyproject.write_text(re.sub(r'version\s*=\s*"\d+\.\d+\.\d+"', f'version = "{new_version}"', content))

          # 4. Update setup.py if it exists
          if setup_py.exists():
              setup_py.write_text(re.sub(r'version\s*=\s*["\']\d+\.\d+\.\d+["\']', f'version="{new_version}"', setup_py.read_text()))

          # 5. Update __init__.py
          if init_py.exists():
              init_content = init_py.read_text()
              # Replaces __version__ = "x.y.z"
              updated_init = re.sub(r'__version__\s*=\s*["\']\d+\.\d+\.\d+["\']', f'__version__ = "{new_version}"', init_content)
              init_py.write_text(updated_init)

          with open("version.txt", "w") as f:
              f.write(new_version)
          EOF
          echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Commit Version Update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml setup.py __init__.py
          git commit -m "chore: release v${{ steps.bump.outputs.version }}" || echo "No changes to commit"
          git push
      - name: Commit Version Update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml

          git commit -m "chore: release v${{ steps.bump.outputs.version }}" || echo "No changes to commit"

          git push

      - name: Pull Latest Changes
        run: |
          git pull origin $(git branch --show-current)

      - name: Create Git Tag
        run: |
          TAG=v${{ steps.bump.outputs.version }}

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Build Package
        run: |
          python -m build

      - name: Verify Package
        run: |
          python -m twine check dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
